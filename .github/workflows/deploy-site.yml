name: Deploy Wilderness Odyssey Website

on:
  workflow_dispatch:   # manual trigger only

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Website branch
        uses: actions/checkout@v4     # fixed — v6 doesn't exist
        with:
          ref: Website                # explicitly targets your Website branch

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .              # correct — your files are in /website folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
